<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Counter</title>
  <style>
    body { font-family: system-ui, sans-serif; display: grid; place-items: center;
           height: 100vh; margin: 0; background: #f5f5f5; }
    #count { font-size: 48px; margin-bottom: 24px; color: #111; }
    /* The button — Claude's task will change this color. */
    #btn { font-size: 20px; padding: 14px 32px; border: none; border-radius: 10px;
           background: #2563eb; color: white; cursor: pointer; }
    #btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div id="count">Count: 0</div>
  <button id="btn">Increment</button>
  <script>
    const API = "http://localhost:8000";
    const label = document.getElementById("count");
    async function refresh() {
      const res = await fetch(API + "/count");
      label.textContent = "Count: " + (await res.json()).count;
    }
    document.getElementById("btn").onclick = async () => {
      const res = await fetch(API + "/increment", { method: "POST" });
      label.textContent = "Count: " + (await res.json()).count;
    };
    refresh();
  </script>
</body>
</html>
